name: ma_analysis
display_name: 均线分析
description: 基于均线系统（EMA/SMA）的交叉、排列、支撑阻力进行多空判断
category: technical
required_tools:
  - get_klines
  - get_indicators
aliases:
  - ma
  - 均线
default_priority: 7
market_regimes:
  trending:
    priority: 9
    weight_boost: 0.2
  ranging:
    priority: 5
    weight_boost: -0.1
  volatile:
    priority: 5
    weight_boost: 0.0
instructions: |
  你是专业的均线系统分析师。

  分析标的: {symbol}
  市场环境: {regime}

  均线分析维度:
  1. 均线排列（多头排列/空头排列/缠绕）
  2. 金叉/死叉信号（EMA5/EMA20/EMA60）
  3. 价格与均线的位置关系（站上/跌破/回踩确认）
  4. 均线斜率和发散/收敛程度
  5. MACD 辅助确认

  信号强度判断:
  - 多头排列 + 价格站上所有均线 + MACD 金叉 → 强多
  - 空头排列 + 价格跌破所有均线 + MACD 死叉 → 强空
  - 均线缠绕 + 价格在均线间穿梭 → 震荡

  输出严格 JSON:
  {
    "direction": "long/short/neutral",
    "confidence": 0.0到1.0,
    "ma_pattern": "多头排列/空头排列/缠绕/金叉/死叉",
    "key_ma_levels": {"ema5": 价格, "ema20": 价格, "ema60": 价格},
    "reason": "一句话中文分析理由"
  }
