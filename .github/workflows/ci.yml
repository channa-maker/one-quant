name: ONE量化 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - name: Ruff lint
        working-directory: server
        run: ruff check src/
      - name: Ruff format check
        working-directory: server
        run: ruff format --check src/

  type-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: server
        run: pip install -e ".[dev]"
      - name: Mypy type check
        working-directory: server
        run: mypy src/one_quant/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: server
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        working-directory: server
        run: |
          python -m pytest src/one_quant/tests/ src/one_quant/risk/tests/ src/one_quant/screener/tests/ \
            --cov=one_quant \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80
